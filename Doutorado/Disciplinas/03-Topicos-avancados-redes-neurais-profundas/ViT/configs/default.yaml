experiment_name: cifar10_simple_vit
output_root: outputs
seed: 42

dataset:
  name: CIFAR10
  root: data
  image_size: 224
  batch_size: 64
  num_workers: 4
  val_split: 0.1

model:
  backend: simple
  name: vit_tiny_patch16_224
  pretrained: false
  patch_size: 16
  embed_dim: 192
  depth: 6
  num_heads: 3
  mlp_ratio: 4.0
  dropout: 0.1

training:
  epochs: 10
  lr: 0.0003
  weight_decay: 0.05
  optimizer: adamw
  scheduler: cosine
  # Options: auto, cpu, cuda, cuda:0, cuda:1, etc.
  device: auto

evaluation:
  num_prediction_images: 16
